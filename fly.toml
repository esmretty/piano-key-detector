# fly.toml — see https://fly.io/docs/reference/configuration/
app = "piano-key-detector"
primary_region = "nrt"   # Tokyo — fastest from Taiwan

[build]
  # Builds the Dockerfile in the project root. Fly's remote builder will
  # do the heavy lifting; no local Docker needed.

[env]
  PORT = "3001"
  NODE_ENV = "production"
  OMR_ENGINE = "auto"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"     # spin down when idle to save money
  auto_start_machines = true      # spin up on next request
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "get"
    timeout = "10s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 2048   # Audiveris Java heap + Node ~ needs ≥1.5 GB

# OMR can take 60–120s on a cold start (model load + transcription).
# Bump request timeouts so the streaming NDJSON connection isn't killed.
[[services]]
  protocol = "tcp"
  internal_port = 3001

  [services.concurrency]
    type = "requests"
    soft_limit = 4
    hard_limit = 8
