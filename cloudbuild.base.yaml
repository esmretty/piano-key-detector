# Cloud Build config for the heavy base image.
# Triggered by .github/workflows/build-base.yml only when Dockerfile.base changes.

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.base
      - -t
      - asia-east1-docker.pkg.dev/$PROJECT_ID/piano-base/runtime:$COMMIT_SHA
      - -t
      - asia-east1-docker.pkg.dev/$PROJECT_ID/piano-base/runtime:latest
      - .

images:
  - asia-east1-docker.pkg.dev/$PROJECT_ID/piano-base/runtime:$COMMIT_SHA
  - asia-east1-docker.pkg.dev/$PROJECT_ID/piano-base/runtime:latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
