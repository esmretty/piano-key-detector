<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1115" />
    <title>Piano Key Detector</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <span id="app-version" class="app-version">dev</span>
        <div class="controls">
          <label class="file-btn">
            <input id="file-input" type="file" accept=".mid,.midi,.xml,.musicxml,.mxl,.png,.jpg,.jpeg,.pdf" hidden />
            <span>📂</span>
          </label>
          <label class="camera-btn ghost-btn" title="拍一段琴譜">
            <input id="camera-input" type="file" accept="image/*" capture="environment" hidden />
            <span>📷</span>
          </label>
          <label class="append-btn ghost-btn" title="追加">
            <input id="append-input" type="file" accept=".mid,.midi,.xml,.musicxml,.mxl,.png,.jpg,.jpeg,.pdf" hidden disabled />
            <span>＋</span>
          </label>
          <button id="bookmarks-btn" class="ghost-btn" title="書籤">📑</button>
          <button id="play-btn" class="play-btn" disabled>▶</button>
          <button id="stop-btn" disabled>■</button>
          <label class="bpm">
            <span>BPM</span>
            <input id="bpm-input" type="number" min="20" max="300" value="60" />
          </label>
          <select id="layout-select" class="layout-select" title="樂譜版面">
            <option value="default">預設</option>
            <option value="compact">緊湊</option>
            <option value="big">大字</option>
          </select>
          <label class="sound-toggle">
            <input id="sound-toggle" type="checkbox" checked />
            <span>🔊</span>
          </label>
        </div>
        <div class="progress" id="progress" hidden>
          <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
        <div id="status" class="status">請選擇 .mid / .musicxml / 圖片琴譜</div>
      </header>

      <div id="rotate-overlay" class="rotate-overlay">
        <div class="rotate-overlay-inner">
          <div class="rotate-icon">📱↺</div>
          <h2>請把裝置轉成橫向</h2>
          <p>這個 app 為了讓你看到完整鋼琴 + 譜面，需要橫向使用</p>
        </div>
      </div>

      <dialog id="bookmarks-dialog" class="bm-dialog">
        <form method="dialog" class="bm-content">
          <div class="bm-header">
            <h2>☁️ 雲端書籤</h2>
            <button value="cancel" class="bm-close" aria-label="關閉">✕</button>
          </div>
          <div class="bm-hint">大家共用、不需登入。儲存/刪除會立即同步給所有人。</div>
          <div class="bm-save">
            <input id="bookmark-name" type="text" placeholder="名稱（留空會用琴譜標題）" maxlength="80" />
            <button type="button" id="bookmark-save-btn">儲存目前琴譜</button>
          </div>
          <ul id="bookmark-list" class="bm-list"></ul>
          <div class="bm-empty" id="bm-empty">雲端還沒有書籤。載入一份琴譜後在這裡儲存。</div>
        </form>
      </dialog>

      <section id="sheet-panel" class="panel sheet-panel">
        <div id="sheet-container"></div>
      </section>

      <section id="piano-panel" class="panel piano-panel">
        <div id="piano-scroll">
          <svg id="piano" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
