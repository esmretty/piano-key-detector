name: Deploy to Cloud Run

# Day-to-day code-only pushes are FAST (~2 min) because the heavy stuff
# lives in a separate base image at piano-base/runtime:latest.
#
# This workflow:
#   1. Checks if the base image needs to be (re)built. It does when:
#        - the image isn't in Artifact Registry yet (first-time setup), or
#        - Dockerfile.base / cloudbuild.base.yaml changed in this push, or
#        - the user manually ran with rebuild_base=true.
#      Otherwise the slow base build is skipped entirely.
#   2. Deploys the slim app image (FROM the base) to Cloud Run.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rebuild_base:
        description: "Force a rebuild of the base image"
        type: boolean
        default: false

env:
  PROJECT_ID: piano-key-detector
  REGION: asia-east1
  SERVICE: piano-key-detector
  BASE_REPO: piano-base
  BASE_IMAGE_TAG: asia-east1-docker.pkg.dev/piano-key-detector/piano-base/runtime:latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit so we can diff against it

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Decide whether to rebuild base image
        id: base
        run: |
          NEED=false
          REASON=cached
          if [[ "${{ inputs.rebuild_base }}" == "true" ]]; then
            NEED=true
            REASON="manual rebuild"
          elif ! gcloud artifacts docker images describe "${{ env.BASE_IMAGE_TAG }}" \
                  --project=${{ env.PROJECT_ID }} >/dev/null 2>&1; then
            NEED=true
            REASON="base image missing in Artifact Registry"
          elif git diff --name-only HEAD~1 HEAD 2>/dev/null | \
                  grep -qE '^(Dockerfile\.base|cloudbuild\.base\.yaml)$'; then
            NEED=true
            REASON="Dockerfile.base changed"
          fi
          echo "need=$NEED" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "Base build needed: $NEED ($REASON)"

      - name: Ensure base Artifact Registry repo
        if: steps.base.outputs.need == 'true'
        run: |
          gcloud artifacts repositories describe ${{ env.BASE_REPO }} \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} >/dev/null 2>&1 || \
          gcloud artifacts repositories create ${{ env.BASE_REPO }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --description="Heavy base image for piano-key-detector"

      - name: Build & push base image
        if: steps.base.outputs.need == 'true'
        run: |
          gcloud builds submit \
            --project=${{ env.PROJECT_ID }} \
            --config=cloudbuild.base.yaml \
            --substitutions=COMMIT_SHA=${{ github.sha }}

      - name: Inject build version into frontend
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_TIME=$(TZ=Asia/Taipei date +"%m-%d %H:%M")
          VERSION="${SHORT_SHA} · ${BUILD_TIME}"
          # Overwrite the committed placeholder. Using a real .ts file (not
          # .env.production) so it survives .gitignore and .dockerignore.
          cat > frontend/src/version.ts <<EOF
          export const APP_VERSION = "${VERSION}";
          EOF
          echo "Injected version: ${VERSION}"

      - name: Deploy app to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --source . \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 8Gi \
            --cpu 2 \
            --timeout 600 \
            --concurrency 4 \
            --min-instances 0 \
            --max-instances 5 \
            --port 3001 \
            --set-env-vars "OMR_ENGINE=auto,NODE_ENV=production" \
            --quiet

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "Deployed at: $URL"
          curl -sf "$URL/api/health" | grep -q '"ok":true' && echo "health check passed"
