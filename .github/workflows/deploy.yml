name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: piano-key-detector
  REGION: asia-east1
  SERVICE: piano-key-detector

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --source . \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 600 \
            --concurrency 4 \
            --min-instances 0 \
            --max-instances 5 \
            --port 3001 \
            --set-env-vars "OMR_ENGINE=auto,NODE_ENV=production" \
            --quiet

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "Deployed at: $URL"
          curl -sf "$URL/api/health" | grep -q '"ok":true' && echo "health check passed"
